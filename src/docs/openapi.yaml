openapi: 3.0.0
info:
  title: Space2Study-UA API
  version: "1.0.0"
  description: "API docs for Space2Study UA"
servers:
  - url: http://localhost:8080
    description: Local dev
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /categories:
    get:
      summary: Categories
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      example: '1'
                      required: true
                    name:
                      type: string
                      example: Category name
                      required: true
                    appearance:
                      type: object
                      properties:
                        icon:
                          type: string
                          example: mocked-path-to-icon
                        color:
                          type: string
                          example: '#66C42C'
  /categories/names:
    get:
      summary: Category names
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                      example: 'Category'
                    id:
                      type: string
                      required: true
                      example: '1'
  /categories/{id}:
    get:
      summary: Category by id
      parameters:
        - name: id
          in: path
          required: true
          description: "ID of the category"
          allowEmptyValue: false
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    example: '1'
                    required: true
                  name:
                    type: string
                    example: Category name
                    required: true
                  appearance:
                    type: object
                    properties:
                      icon:
                        type: string
                        example: mocked-path-to-icon
                      color:
                        type: string
                        example: '#66C42C'

  /subjects/:
    get:
      tags: [Subjects]
      summary: Get subjects
      description: Returns a paginated list of subjects with optional filters and sorting.
      parameters:
        - in: query
          name: categoryId
          schema:
            type: string
          description: Resources category ObjectId to filter subjects
        - in: query
          name: name
          schema:
            type: string
          description: Case-insensitive name search substring
        - in: query
          name: skip
          schema:
            type: integer
            minimum: 0
          description: Number of items to skip
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
          description: Max number of items to return
        - in: query
          name: sort
          schema:
            type: string
            example: '{"order":"asc","orderBy":"updatedAt"}'
          description: JSON string specifying sort order and field
      responses:
        '200':
          description: List of subjects with total count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubjectList'
        '400':
          description: Bad request (invalid query params)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      tags: [Subjects]
      summary: Create a subject (Admin only)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubjectCreate'
      responses:
        '201':
          description: Created subject
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subject'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden (Admin only)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Validation or duplicate key error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /subjects/names:
    get:
      tags: [Subjects]
      summary: Get subject names
      description: Returns a list of subject names, optionally filtered by category.
      parameters:
        - in: query
          name: categoryId
          schema:
            type: string
          description: Resources category ObjectId to filter subjects
      responses:
        '200':
          description: Array of subject names
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SubjectName'
        '400':
          description: Bad request (invalid query params)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /subjects/{id}:
    get:
      tags: [Subjects]
      summary: Get subject by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Subject ObjectId
      responses:
        '200':
          description: Subject
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subject'
        '400':
          description: Bad request (invalid id format)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    patch:
      tags: [Subjects]
      summary: Update a subject (Admin only)
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Subject ObjectId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubjectUpdate'
      responses:
        '204':
          description: Updated successfully (no content)
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden (Admin only)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags: [Subjects]
      summary: Delete a subject (Admin only)
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Subject ObjectId
      responses:
        '204':
          description: Deleted successfully (no content)
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden (Admin only)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'