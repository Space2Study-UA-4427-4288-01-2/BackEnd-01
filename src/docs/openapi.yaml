openapi: 3.0.0
info:
  title: Space2Study-UA API
  version: "1.0.0"
  description: "API docs for Space2Study UA"
servers:
  - url: http://localhost:8080
    description: Local dev
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /category:
    get:
      summary: Categories
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      example: '1'
                    name:
                      type: string
                      example: Category name
                    appearance:
                      type: object
                      properties:
                        icon:
                          type: string
                          example: mocked-path-to-icon
                        color:
                          type: string
                          example: '#66C42C'

  /lessons/:
    get:
      summary: Get lessons
      description: Returns a paginated list of lessons with optional filters and sorting. Public.
      parameters:
        - in: query
          name: categoryId
          schema:
            type: string
            example: 64a7f6d3c9a1b2f3e0d1c2b3
          description: Resources category ObjectId to filter lessons
        - in: query
          name: title
          schema:
            type: string
            example: Algebra
          description: Title substring filter
        - in: query
          name: skip
          schema:
            type: integer
            minimum: 0
            example: 0
          description: Number of items to skip
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            example: 10
          description: Max number of items to return
        - in: query
          name: sort
          schema:
            type: string
            example: '{"order":"asc","orderBy":"title"}'
          description: JSON string specifying sort order and field
      responses:
        '200':
          description: List of lessons with total count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LessonList'
        '400':
          description: Bad request (invalid query params)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Create a lesson
      description: Create a new lesson. Tutor or Admin.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LessonCreate'
            example:
              title: Linear Algebra
              description: Vectors, matrices, and eigenvalues.
              attachments:
                - 64a7f6d3c9a1b2f3e0d1c2b3
                - 64a7f6d3c9a1b2f3e0d1c2b4
              category: 64a7f6d3c9a1b2f3e0d1c2f9
      responses:
        '201':
          description: Lesson created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lesson'
        '400':
          description: Bad request (invalid body)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden (Tutor or Admin only)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /lessons/{id}:
    get:
      summary: Get lesson by id
      description: Returns a single lesson by its id. Public.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            example: 64a7f6d3c9a1b2f3e0d1c2b3
          description: Lesson ObjectId
      responses:
        '200':
          description: Single lesson
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lesson'
        '400':
          description: Bad request (invalid id format)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Delete lesson
      description: Delete a lesson by id. Tutor or Admin.
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            example: 64a7f6d3c9a1b2f3e0d1c2b3
          description: Lesson ObjectId
      responses:
        '204':
          description: Deleted successfully (no content)
        '400':
          description: Bad request (invalid id)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden (Tutor or Admin only)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Lesson not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      summary: Update lesson
      description: Update fields of a lesson by id. Tutor or Admin.
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            example: 64a7f6d3c9a1b2f3e0d1c2b3
          description: Lesson ObjectId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LessonUpdate'
            example:
              title: Linear Algebra (Updated)
              description: Updated description
              attachments:
                - 64a7f6d3c9a1b2f3e0d1c2b4
              category: 64a7f6d3c9a1b2f3e0d1c2f9
      responses:
        '204':
          description: Updated successfully (no content)
        '400':
          description: Bad request (invalid body or id)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden (Tutor or Admin only)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Lesson not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: accessToken
  schemas:
    Error:
      type: object
      properties:
        message:
          type: string
          example: Invalid request parameters
        statusCode:
          type: integer
          example: 400
      required:
        - message
        - statusCode
    Lesson:
      type: object
      properties:
        _id:
          type: string
          example: 507f1f77bcf86cd799439011
        title:
          type: string
          example: Algebra Basics
        description:
          type: string
          example: Introduction to algebraic expressions
        attachments:
          type: array
          items:
            type: string
            description: Attachment ObjectId
            example: 64a7f6d3c9a1b2f3e0d1c2b3
        category:
          type: string
          description: Category ObjectId
          example: 64a7f6d3c9a1b2f3e0d1c2b3
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    LessonCreate:
      type: object
      required:
        - title
        - category
      properties:
        title:
          type: string
          example: Algebra Basics
        description:
          type: string
          example: Introduction to algebraic expressions
        attachments:
          type: array
          items:
            type: string
            description: Attachment ObjectId
        category:
          type: string
          description: Category ObjectId
    LessonUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        attachments:
          type: array
          items:
            type: string
        category:
          type: string

    LessonList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Lesson'
        count:
          type: integer
          example: 42
