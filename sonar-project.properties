sonar.projectKey=Space2Study-UA-4427-4288-01-2_BackEnd-01
sonar.organization=space2study-ua-4427-4288-01-2

sonar.projectName=BackEnd-01

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=./src
sonar.exclusions=**/src/test/**/*, **/emails/**/*
sonar.inclusions=**/emails/index.js
sonar.coverage.exclusions=**/src/consts/*

sonar.tests=./src/test

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

# Exclude test subdirectories from source scope
sonar.javascript.lcov.reportPaths=./src/test/coverage/lcov.info
sonar.testExecutionReportPaths=./test-report.xml
# sonar.eslint.reportPaths=./eslint-report.json
